# MADRE — despliegue self-hosted con Docker Compose.
# Uso:
#   1. cp .env.example .env.production y rellena los valores.
#   2. docker compose --env-file .env.production up -d --build
#   3. docker compose --env-file .env.production exec app npx prisma migrate deploy
#   4. Visita http://localhost:3000 → asistente de primer arranque.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: madre
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD}
      POSTGRES_DB: madre
    volumes:
      - madre_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U madre"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://madre:${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD}@db:5432/madre?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?define SESSION_SECRET}
      STORAGE_DIR: /data/storage
      SMTP_URL: ${SMTP_URL:-}
      MAIL_FROM: ${MAIL_FROM:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    ports:
      - "3000:3000"
    volumes:
      - madre_storage:/data/storage
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  madre_db:
  madre_storage:
